<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />

<title>الصفحة غير موجودة · إت ماستر</title>

<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--charcoal:#171311;--ember:#c0432f;--oxblood:#9b2a24;--cream-dim:#c9c2b3;--ink:#f4efe6}
  *{box-sizing:border-box;margin:0}
  body{font-family:"Tajawal",sans-serif;background:var(--charcoal);color:var(--ink);min-height:100dvh;
    display:grid;place-items:center;text-align:center;padding:24px;
    background-image:radial-gradient(80% 60% at 50% 0%,rgba(122,32,29,.3),transparent 60%)}
  .mark{color:var(--ember);margin-bottom:10px}
  h1{font-family:"El Messiri",sans-serif;font-size:clamp(64px,16vw,120px);line-height:1;color:var(--ink)}
  h2{font-family:"El Messiri",sans-serif;font-size:clamp(22px,4vw,32px);margin:8px 0 14px}
  p{color:var(--cream-dim);font-size:17px;margin-bottom:28px;max-width:46ch}
  a{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--ember),var(--oxblood));
    color:#fff;font-weight:700;padding:14px 26px;border-radius:999px;text-decoration:none;font-size:16px}
</style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 64 48" width="72" height="54" aria-hidden="true">
      <g fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">

      </g>

    <p>يمكن الرابط قديم أو فيه خطأ بسيط. رجّعناك للقائمة الرئيسية عشان تكمّل تصفّح إت ماستر.</p>
    <a href="/et-master/">العودة للرئيسية</a>
  </main>
</body>
</html>
